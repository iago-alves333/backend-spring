# ============================================================
# Configurações de conexão com o banco de dados PostgreSQL
# ============================================================
# As credenciais agora usam variáveis de ambiente.
# Para rodar localmente, defina as variáveis antes de iniciar a aplicação:
#   export DB_URL=jdbc:postgresql://127.0.0.1:5433/minha_api_db
#   export DB_USERNAME=api_user
#   export DB_PASSWORD=senha123
#
# Os valores após os ":" são os DEFAULTS usados quando a variável não está definida.
# Isso permite que funcione em dev sem configurar nada, mas em produção
# as variáveis de ambiente REAIS sobrescrevem os defaults.
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5433/minha_api_db}
spring.datasource.username=${DB_USERNAME:api_user}
spring.datasource.password=${DB_PASSWORD:senha123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ============================================================

twitch.client.id=${TWITCH_CLIENT_ID:insira_o_client_id_aqui}
twitch.client.secret=${TWITCH_CLIENT_SECRET:insira_o_client_secret_aqui}

# ============================================================
# Configurações JWT
# ============================================================
# IMPORTANTE: Em produção, a chave secreta DEVE ser uma variável de ambiente
# e ter no mínimo 256 bits (32 caracteres) para HMAC-SHA256.
# O valor default abaixo é APENAS para desenvolvimento local.
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-com-pelo-menos-32-chars!}
# Expiração do token: 86400000ms = 24 horas
jwt.expiration-ms=${JWT_EXPIRATION:86400000}